name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: ${{ matrix.task }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task: [fmt:check, lint, knip, typecheck, test]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - run: bun run ${{ matrix.task }}

  build:
    name: build
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://user:pass@localhost:5432/db
      BETTER_AUTH_SECRET: ci-build-placeholder-secret-not-for-production-use-32chars+
      GITHUB_CLIENT_ID: ci-build-placeholder
      GITHUB_CLIENT_SECRET: ci-build-placeholder
      OPENROUTER_API_KEY: ci-build-placeholder
      TAVILY_API_KEY: ci-build-placeholder
      TMDB_READ_ACCESS_TOKEN: ci-build-placeholder
      UPSTASH_REDIS_REST_URL: https://ci-build.upstash.io
      UPSTASH_REDIS_REST_TOKEN: ci-build-placeholder
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - name: Cache Next.js build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('bun.lock') }}-${{ hashFiles('next.config.ts', 'postcss.config.mjs', 'tsconfig.json', 'src/**') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('bun.lock') }}-
      - run: bun run build

  ci:
    name: ci
    runs-on: ubuntu-latest
    needs: [checks, build]
    steps:
      - run: echo "All checks passed."
