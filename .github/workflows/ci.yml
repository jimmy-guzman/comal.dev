name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - run: bun run fmt:check

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - run: bun run lint

  knip:
    name: knip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - run: bun run knip

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - run: bun run typecheck

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - run: bun run test

  build:
    name: build
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://user:pass@localhost:5432/db
      BETTER_AUTH_SECRET: ci-build-placeholder-secret-not-for-production-use-32chars+
      GITHUB_CLIENT_ID: ci-build-placeholder
      GITHUB_CLIENT_SECRET: ci-build-placeholder
      OPENROUTER_API_KEY: ci-build-placeholder
      TAVILY_API_KEY: ci-build-placeholder
      TMDB_READ_ACCESS_TOKEN: ci-build-placeholder
      UPSTASH_REDIS_REST_URL: https://ci-build.upstash.io
      UPSTASH_REDIS_REST_TOKEN: ci-build-placeholder
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - run: bun run build

  ci:
    name: ci
    runs-on: ubuntu-latest
    needs: [fmt, lint, knip, typecheck, test, build]
    steps:
      - run: echo "All checks passed."
