name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: ${{ matrix.task }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task: [fmt:check, lint, knip, typecheck, test]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - run: bun run ${{ matrix.task }}

  build:
    name: build
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://user:pass@localhost:5432/db
      BETTER_AUTH_SECRET: ci-build-placeholder-secret-not-for-production-use-32chars+
      GITHUB_CLIENT_ID: ci-build-placeholder
      GITHUB_CLIENT_SECRET: ci-build-placeholder
      OPENROUTER_API_KEY: ci-build-placeholder
      TAVILY_API_KEY: ci-build-placeholder
      TMDB_READ_ACCESS_TOKEN: ci-build-placeholder
      UPSTASH_REDIS_REST_URL: https://ci-build.upstash.io
      UPSTASH_REDIS_REST_TOKEN: ci-build-placeholder
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('bun.lock') }}-${{ hashFiles('src/**/*.ts', 'src/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('bun.lock') }}-
      - run: bun run build

  ci:
    name: ci
    runs-on: ubuntu-latest
    needs: [checks, build]
    steps:
      - run: echo "All checks passed."
