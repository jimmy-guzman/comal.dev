pre-commit:
  parallel: true
  jobs:
    - name: lint
      glob: "*.{ts,tsx,js,mjs,cjs}"
      run: bun run eslint --fix --no-warn-ignored {staged_files}
      stage_fixed: true
    - name: fmt
      run: bun run oxfmt {staged_files}
      stage_fixed: true
    - name: knip
      run: bun run knip
